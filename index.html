<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusAI Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- Sidebar -->
<aside class="sidebar">
<h2>FOCUSAI</h2>

<nav>
<a href="#" class="nav-item active">Dashboard</a>
<a href="#" class="nav-item">Tasks</a>
<a href="#" class="nav-item">Timer</a>
<a href="#" class="nav-item">Notes</a>
</nav>

<button id="themeToggle">Toggle Theme</button>
</aside>

<!-- Main -->
<main class="main">

<header class="topbar">
<h1>PRODUCTIVITY DASHBOARD</h1>
<button id="btn">Get Motivation</button>
</header>

<section class="grid">

<div class="card">
<h3>Welcome 👋</h3>
<p>Stay productive and achieve your goals today.</p>
</div>

<!-- TASKS -->
<div class="card">
<h3>🌸 Tasks</h3>

<div class="task-input">
<input type="text" id="taskInput" placeholder="Add a task...">
<button id="addTask">+</button>
</div>

<ul id="taskList"></ul>
</div>

<!-- TIMER -->
<div class="card">
<h3>⏳ Timer</h3>
<div id="timerdisplay">25:00</div>

<div class="timer-buttons">
<button id="startTimer">Start</button>
<button id="resetTimer">Reset</button>
</div>
</div>

<!-- NOTES -->
<div class="card">
<h3>📝 Notes</h3>
<textarea id="notes" placeholder="Write something..."></textarea>
</div>

<!-- MOTIVATION -->
<div class="card">
<h3>✨ Motivation</h3>
<p id="quote">Click to get inspired</p>
</div>

</section>
</main>

</div>

<script src="script.js"></script>
</body>
</html>
